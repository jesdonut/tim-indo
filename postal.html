<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postal Code — Grasp Agent Japan</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined" rel="stylesheet">
<style>
:root {
  --bg: #f0f6ff;
  --text: #1e3a5f;
  --primary: #1d4ed8;
  --primary-2: #2563eb;
  --primary-hover: #1d4ed8;
  --primary-dark: #1e40af;
  --light: #eff6ff;
  --mid: #dbeafe;
  --border: #bfdbfe;
  --border-soft: #93c5fd;
  --muted: #5b87c5;
  --accent: #3b82f6;
  --brand-bg: #1d4ed8;
  --brand-sub: #bfdbfe;
  --input-bg: #f8faff;
}
body.pink {
  --bg: #fdf5f8;
  --text: #4d2a38;
  --primary: #9e5c78;
  --primary-2: #b07090;
  --primary-hover: #8a4a65;
  --primary-dark: #6e3450;
  --light: #faecf2;
  --mid: #f5dae5;
  --border: #e8bece;
  --border-soft: #f2cdd8;
  --muted: #9e7585;
  --accent: #a86880;
  --brand-bg: #b8899e;
  --brand-sub: #f5dae5;
  --input-bg: #fdf5f8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
.material-icons, .material-icons-outlined { vertical-align: middle; user-select: none; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans JP', sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; height: 100dvh;
  overflow: hidden; display: flex; flex-direction: column;
}

.brand-bar {
  flex-shrink: 0; background: var(--brand-bg);
  padding: 11px 20px 0;
  display: flex; align-items: center; gap: 10px; justify-content: center; position: relative;
}
.brand-icon { font-size: 1.6rem; color: #fff; line-height: 1; }
.brand-name { font-size: 1rem; font-weight: 700; color: #fff; }
.brand-ja { font-size: 0.67rem; color: var(--brand-sub); margin-top: 1px; }
.theme-toggle {
  position: absolute; right: 14px; top: 11px;
  background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35);
  color: #fff; border-radius: 20px; padding: 4px 10px; font-size: 0.78rem;
  cursor: pointer; transition: background 0.2s; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
}
.theme-toggle:hover { background: rgba(255,255,255,0.3); }
.theme-toggle .material-icons-outlined { font-size: 0.95rem; }

.nav-bar {
  flex-shrink: 0; background: var(--brand-bg);
  padding: 8px 16px 10px; display: flex; justify-content: center;
}
.nav-tabs {
  background: rgba(0,0,0,0.18); border-radius: 9px; padding: 3px; display: flex; gap: 2px;
}
.nav-tab {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 16px; border-radius: 7px; font-size: 0.8rem; font-weight: 600;
  color: rgba(255,255,255,0.72); text-decoration: none; transition: background 0.15s, color 0.15s;
}
.nav-tab .material-icons-outlined { font-size: 0.95rem; }
.nav-tab:hover { background: rgba(255,255,255,0.15); color: #fff; }
.nav-tab.active { background: rgba(255,255,255,0.95); color: var(--brand-bg); }

.mid {
  flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden;
  padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 12px;
}

.app-title { text-align: center; }
.app-title h1 { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin-bottom: 2px; }
.app-title p { color: var(--muted); font-size: 0.76rem; }

.search-wrap {
  display: flex; align-items: center;
  background: #fff; border: 1.5px solid var(--border); border-radius: 10px;
  overflow: hidden; transition: border-color 0.2s;
}
.search-wrap:focus-within { border-color: var(--primary-2); }
.search-wrap.error { border-color: #ef4444; animation: shake 0.35s ease; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}
.search-icon {
  padding: 0 8px 0 13px; color: var(--border-soft); flex-shrink: 0;
  font-size: 1.2rem; transition: color 0.2s;
}
.search-wrap:focus-within .search-icon { color: var(--accent); }
.search-input {
  flex: 1; background: transparent; border: none; outline: none;
  padding: 13px 10px 13px 4px; font-size: 1.05rem;
  color: var(--text); font-family: inherit;
}
.search-input::placeholder { color: var(--border-soft); font-size: 0.92rem; }
.detect-pill {
  font-size: 0.6rem; font-weight: 700; padding: 2px 7px; border-radius: 10px;
  margin-right: 10px; white-space: nowrap; flex-shrink: 0;
  background: var(--mid); color: var(--accent);
  opacity: 0; transition: opacity 0.2s;
}
.detect-pill.visible { opacity: 1; }

.btn-row { display: flex; justify-content: flex-end; }
.search-btn {
  padding: 10px 24px; background: var(--primary-2); color: #fff;
  border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: background 0.2s, transform 0.1s;
  display: flex; align-items: center; gap: 5px;
}
.search-btn .material-icons-outlined { font-size: 1.1rem; }
.search-btn:hover { background: var(--primary-hover); }
.search-btn:active { transform: scale(0.97); }
.search-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.results { display: none; flex-direction: column; gap: 8px; }
.results.visible { display: flex; }
.result-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.result-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 12px; border-bottom: 1px solid var(--border); background: var(--light);
}
.result-label { font-size: 0.7rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; }
.result-meta { font-size: 0.68rem; color: var(--muted); font-style: italic; text-align: right; }
.copy-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  font-size: 0.65rem; padding: 2px 8px; border-radius: 4px;
  cursor: pointer; transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.copy-btn:hover { color: var(--primary); border-color: var(--border-soft); background: var(--mid); }
.copy-btn.copied { color: #16a34a; border-color: #86efac; background: #f0fdf4; }
.result-body { padding: 10px 14px; font-size: 0.92rem; line-height: 1.75; color: var(--text); min-height: 42px; }
.loading-dots { color: var(--border-soft); font-style: italic; font-size: 0.82rem; }
.err-text { color: #ef4444; font-size: 0.82rem; }
.addr-code { font-size: 0.78rem; color: var(--muted); margin-bottom: 3px; }
.addr-main { font-size: 1rem; font-weight: 600; }
.addr-extra { font-size: 0.78rem; color: var(--accent); margin-top: 4px; }

.narrowed-note {
  font-size: 0.72rem; color: var(--accent); background: var(--light);
  border: 1px solid var(--border); border-radius: 7px;
  padding: 6px 10px; display: flex; align-items: center; gap: 5px;
}
.narrowed-note .material-icons-outlined { font-size: 0.9rem; }

.addr-list { display: flex; flex-direction: column; }
.addr-list-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.addr-list-item:last-child { border-bottom: none; }
.addr-list-item:hover { background: var(--light); }
.addr-item-code {
  font-size: 0.82rem; font-weight: 700; color: var(--primary);
  font-family: 'Courier New', monospace; letter-spacing: 0.04em;
  white-space: nowrap; flex-shrink: 0; min-width: 76px;
}
.addr-item-info { flex: 1; min-width: 0; }
.addr-item-address { font-size: 0.85rem; font-weight: 500; color: var(--text); }
.addr-item-kana { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
.addr-item-copy {
  background: none; border: 1px solid var(--border); color: var(--muted);
  font-size: 0.62rem; padding: 2px 7px; border-radius: 4px;
  cursor: pointer; flex-shrink: 0;
  transition: color 0.15s, border-color 0.15s, background 0.15s; white-space: nowrap;
}
.addr-item-copy:hover { color: var(--primary); border-color: var(--border-soft); background: var(--mid); }
.addr-item-copy.copied { color: #16a34a; border-color: #86efac; background: #f0fdf4; }
</style>
</head>
<body>

<div class="brand-bar">
  <span class="material-icons-outlined brand-icon">local_post_office</span>
  <div>
    <div class="brand-name">Grasp Agent Japan</div>
    <div class="brand-ja">&#12464;&#12521;&#12473;&#12503;&#12456;&#12540;&#12472;&#12455;&#12531;&#12488;&#12472;&#12515;&#12497;&#12531;</div>
  </div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
    <span class="material-icons-outlined">palette</span> Pink
  </button>
</div>
<nav class="nav-bar">
  <div class="nav-tabs">
    <a class="nav-tab" href="/">
      <span class="material-icons-outlined">description</span> PDF
    </a>
    <a class="nav-tab" href="/translate">
      <span class="material-icons-outlined">translate</span> Translate
    </a>
    <a class="nav-tab active" href="/postal">
      <span class="material-icons-outlined">local_post_office</span> Postal
    </a>
  </div>
</nav>

<div class="mid">
  <div class="app-title">
    <h1>Japan Postal Code</h1>
    <p>Paste a 〒 code or type an address — it figures out which</p>
  </div>

  <div>
    <div class="search-wrap" id="searchWrap">
      <span class="material-icons-outlined search-icon" id="searchIcon">search</span>
      <input class="search-input" id="searchInput" type="text"
        placeholder="123-4567 or 渋谷区..." autocomplete="off" autocorrect="off" spellcheck="false">
      <span class="detect-pill" id="detectPill"></span>
    </div>
    <div style="margin-top:8px">
      <div class="btn-row">
        <button class="search-btn" id="searchBtn" onclick="detectAndSearch()">
          <span class="material-icons-outlined">search</span> Search
        </button>
      </div>
    </div>
  </div>

  <div class="results" id="codeResults">
    <div class="result-card">
      <div class="result-header">
        <span class="result-label">Address</span>
        <button class="copy-btn" onclick="copyEl('addressOut',this)">Copy</button>
      </div>
      <div class="result-body" id="addressOut"></div>
    </div>
    <div class="result-card">
      <div class="result-header">
        <span class="result-label">Reading (Kana)</span>
        <button class="copy-btn" onclick="copyEl('kanaOut',this)">Copy</button>
      </div>
      <div class="result-body" id="kanaOut"></div>
    </div>
    <div class="result-card">
      <div class="result-header">
        <span class="result-label">Reading (Romaji)</span>
        <button class="copy-btn" onclick="copyEl('romajiOut',this)">Copy</button>
      </div>
      <div class="result-body" id="romajiOut"></div>
    </div>
  </div>

  <div class="results" id="addrResults">
    <div id="narrowedNote" style="display:none" class="narrowed-note">
      <span class="material-icons-outlined">info</span>
      <span id="narrowedText"></span>
    </div>
    <div class="result-card">
      <div class="result-header">
        <span class="result-label">Matching postal codes</span>
        <span class="result-meta" id="resultCountNote"></span>
      </div>
      <div class="addr-list" id="addrList"></div>
    </div>
  </div>
</div>

<script>
var THEME_KEY = 'gaj_theme';

function toggleTheme() {
  var isPink = document.body.classList.toggle('pink');
  localStorage.setItem(THEME_KEY, isPink ? 'pink' : 'blue');
  document.getElementById('themeToggle').innerHTML =
    '<span class="material-icons-outlined">palette</span> ' + (isPink ? 'Blue' : 'Pink');
}
(function() {
  if (localStorage.getItem(THEME_KEY) === 'pink') {
    document.body.classList.add('pink');
    document.getElementById('themeToggle').innerHTML = '<span class="material-icons-outlined">palette</span> Blue';
  }
})();

var searchInput = document.getElementById('searchInput');
var detectPill  = document.getElementById('detectPill');
var searchIcon  = document.getElementById('searchIcon');

function updateHints() {
  var val = searchInput.value;
  if (!val) {
    detectPill.textContent = ''; detectPill.className = 'detect-pill';
    searchIcon.textContent = 'search';
    return;
  }
  if (/^[\d\-\s]*$/.test(val)) {
    detectPill.textContent = '〒 code'; detectPill.className = 'detect-pill visible';
    searchIcon.textContent = 'pin';
  } else {
    detectPill.textContent = 'address'; detectPill.className = 'detect-pill visible';
    searchIcon.textContent = 'location_on';
  }
}

searchInput.addEventListener('input', function() {
  var val = searchInput.value;
  // Auto-format as postal code when input is all digits/hyphens
  if (/^[\d\-]*$/.test(val) && val.length > 0) {
    var d = val.replace(/\D/g, '').slice(0, 7);
    var formatted = d.length > 3 ? d.slice(0,3) + '-' + d.slice(3) : d;
    if (searchInput.value !== formatted) searchInput.value = formatted;
  }
  updateHints();
});

searchInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); detectAndSearch(); }
});

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function setLoading(id) {
  var el = document.getElementById(id);
  el.innerHTML = '<span class="loading-dots">…</span>';
  el.className = 'result-body';
}
function setCard(id, html, isErr) {
  var el = document.getElementById(id);
  el.innerHTML = html;
  el.className = 'result-body' + (isErr ? ' err-text' : '');
}
function copyEl(elId, btn) {
  var text = (document.getElementById(elId).innerText || '').trim();
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = 'Copied!'; btn.className = 'copy-btn copied';
    setTimeout(function() { btn.textContent = 'Copy'; btn.className = 'copy-btn'; }, 1500);
  });
}
function copyCode(code, btn) {
  navigator.clipboard.writeText(code).then(function() {
    btn.textContent = 'Copied!'; btn.className = 'addr-item-copy copied';
    setTimeout(function() { btn.textContent = 'Copy 〒'; btn.className = 'addr-item-copy'; }, 1500);
  });
}

function googleRomaji(text) {
  var url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=en' +
            '&dt=t&dt=rm&dj=1&q=' + encodeURIComponent(text);
  return fetch(url)
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(data) {
      var romaji = '';
      if (data && Array.isArray(data.sentences)) {
        data.sentences.forEach(function(seg) {
          var r = seg.src_translit || seg.translit || '';
          if (r) romaji += (romaji ? ' ' : '') + r;
        });
      } else if (data && Array.isArray(data[0])) {
        data[0].forEach(function(seg) {
          var r = seg[2] || (Array.isArray(seg) && seg[3]) || '';
          if (r) romaji += r;
        });
        if (!romaji && data[12]) romaji = data[12];
      }
      return romaji.trim();
    });
}

function stripBlockNumbers(s) {
  return s.replace(/[\s　]*[0-9０-９][0-9０-９\-ー―丁目番地号\s]*/u, '').trim();
}

function searchByAddress(query) {
  var url = 'https://zipcloud.ibsnet.co.jp/api/search?address=' + encodeURIComponent(query) + '&limit=20';
  return fetch(url)
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(data) { return data.results || []; });
}

function shake() {
  var wrap = document.getElementById('searchWrap');
  wrap.classList.add('error');
  setTimeout(function() { wrap.classList.remove('error'); }, 400);
}

function detectAndSearch() {
  var val = searchInput.value.trim();
  if (!val) { shake(); return; }

  var digits = val.replace(/\D/g, '');
  if (/^[\d\-\s]*$/.test(val)) {
    // Looks like a postal code attempt
    if (digits.length !== 7) { shake(); return; }
    doCodeSearch(digits);
  } else {
    doAddrSearch(val);
  }
}

function doCodeSearch(digits) {
  var btn = document.getElementById('searchBtn');
  btn.disabled = true;
  document.getElementById('addrResults').className = 'results';
  document.getElementById('codeResults').className = 'results visible';
  setLoading('addressOut'); setLoading('kanaOut'); setLoading('romajiOut');

  fetch('https://zipcloud.ibsnet.co.jp/api/search?zipcode=' + digits)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.results || data.results.length === 0) {
        var code = digits.slice(0,3) + '-' + digits.slice(3);
        setCard('addressOut', '〒 ' + esc(code) + ' — no address found.', true);
        setCard('kanaOut', '—', false); setCard('romajiOut', '—', false);
        return;
      }
      var first = data.results[0];
      var code  = first.zipcode.slice(0,3) + '-' + first.zipcode.slice(3);
      var addrHtml = '<div class="addr-code">〒 ' + esc(code) + '</div>' +
        '<div class="addr-main">' + esc(first.address1) + '　' + esc(first.address2) + '　' + esc(first.address3) + '</div>';
      if (data.results.length > 1) {
        addrHtml += '<div class="addr-extra">+ ' + (data.results.length - 1) + ' more area' + (data.results.length > 2 ? 's' : '') + ' share this code</div>';
      }
      setCard('addressOut', addrHtml, false);
      var kana = [first.kana1, first.kana2, first.kana3].filter(Boolean).join('　');
      setCard('kanaOut', esc(kana) || '—', false);
      googleRomaji(first.address1 + first.address2 + first.address3)
        .then(function(r) { setCard('romajiOut', esc(r) || '(no reading returned)', !r); })
        .catch(function(e) { setCard('romajiOut', 'Error: ' + esc(e.message), true); });
    })
    .catch(function(e) {
      setCard('addressOut', 'Error: ' + esc(e.message), true);
      setCard('kanaOut', '—', false); setCard('romajiOut', '—', false);
    })
    .finally(function() { btn.disabled = false; });
}

function doAddrSearch(query) {
  var btn = document.getElementById('searchBtn');
  btn.disabled = true;
  document.getElementById('codeResults').className = 'results';
  document.getElementById('addrResults').className = 'results visible';
  document.getElementById('narrowedNote').style.display = 'none';
  document.getElementById('resultCountNote').textContent = '';
  document.getElementById('addrList').innerHTML =
    '<div style="padding:12px 14px"><span class="loading-dots">Searching…</span></div>';

  searchByAddress(query)
    .then(function(results) {
      if (!results || results.length === 0) {
        var stripped = stripBlockNumbers(query);
        if (stripped && stripped !== query) {
          return searchByAddress(stripped).then(function(results2) {
            renderAddrResults(results2, stripped, query);
          });
        }
        renderAddrResults([], query, null);
        return;
      }
      renderAddrResults(results, query, null);
    })
    .catch(function(e) {
      document.getElementById('addrList').innerHTML =
        '<div class="result-body err-text">Error: ' + esc(e.message) + '</div>';
    })
    .finally(function() { btn.disabled = false; });
}

function renderAddrResults(results, usedQuery, originalQuery) {
  if (originalQuery && originalQuery !== usedQuery) {
    var note = document.getElementById('narrowedNote');
    note.style.display = 'flex';
    document.getElementById('narrowedText').textContent =
      'Building numbers removed — showing results for 「' + usedQuery + '」';
  }

  if (!results || results.length === 0) {
    document.getElementById('resultCountNote').textContent = '';
    document.getElementById('addrList').innerHTML =
      '<div class="result-body err-text">No results found. Try a shorter or different address.</div>';
    return;
  }

  var atMax = results.length >= 20;
  document.getElementById('resultCountNote').textContent =
    atMax ? '20 shown — try a more specific address' : results.length + ' result' + (results.length > 1 ? 's' : '');

  var html = '';
  results.forEach(function(r) {
    var code    = r.zipcode.slice(0,3) + '-' + r.zipcode.slice(3);
    var address = esc(r.address1) + esc(r.address2) + esc(r.address3);
    var kana    = esc([r.kana1, r.kana2, r.kana3].filter(Boolean).join('　'));
    html += '<div class="addr-list-item">' +
      '<div class="addr-item-code">〒 ' + esc(code) + '</div>' +
      '<div class="addr-item-info">' +
        '<div class="addr-item-address">' + (address || '—') + '</div>' +
        (kana ? '<div class="addr-item-kana">' + kana + '</div>' : '') +
      '</div>' +
      '<button class="addr-item-copy" onclick="copyCode(\'' + esc(code) + '\',this)">Copy 〒</button>' +
    '</div>';
  });
  document.getElementById('addrList').innerHTML = html;
}
</script>
</body>
</html>
