<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postal Code — Grasp Agent Japan</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined" rel="stylesheet">
<style>
:root {
  --bg: #f0f6ff;
  --text: #1e3a5f;
  --primary: #1d4ed8;
  --primary-2: #2563eb;
  --primary-hover: #1d4ed8;
  --primary-dark: #1e40af;
  --light: #eff6ff;
  --mid: #dbeafe;
  --border: #bfdbfe;
  --border-soft: #93c5fd;
  --muted: #5b87c5;
  --accent: #3b82f6;
  --brand-bg: #1d4ed8;
  --brand-sub: #bfdbfe;
  --input-bg: #f8faff;
}
body.pink {
  --bg: #fdf5f8;
  --text: #4d2a38;
  --primary: #9e5c78;
  --primary-2: #b07090;
  --primary-hover: #8a4a65;
  --primary-dark: #6e3450;
  --light: #faecf2;
  --mid: #f5dae5;
  --border: #e8bece;
  --border-soft: #f2cdd8;
  --muted: #9e7585;
  --accent: #a86880;
  --brand-bg: #b8899e;
  --brand-sub: #f5dae5;
  --input-bg: #fdf5f8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
.material-icons, .material-icons-outlined { vertical-align: middle; user-select: none; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans JP', sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; height: 100dvh;
  overflow: hidden; display: flex; flex-direction: column;
}

.brand-bar {
  flex-shrink: 0; background: var(--brand-bg);
  padding: 11px 20px 0;
  display: flex; align-items: center; gap: 10px; justify-content: center; position: relative;
}
.brand-icon { font-size: 1.6rem; color: #fff; line-height: 1; }
.brand-name { font-size: 1rem; font-weight: 700; color: #fff; }
.brand-ja { font-size: 0.67rem; color: var(--brand-sub); margin-top: 1px; }
.theme-toggle {
  position: absolute; right: 14px; top: 11px;
  background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35);
  color: #fff; border-radius: 20px; padding: 4px 10px; font-size: 0.78rem;
  cursor: pointer; transition: background 0.2s; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
}
.theme-toggle:hover { background: rgba(255,255,255,0.3); }
.theme-toggle .material-icons-outlined { font-size: 0.95rem; }

.nav-bar {
  flex-shrink: 0; background: var(--brand-bg);
  padding: 8px 16px 10px; display: flex; justify-content: center;
}
.nav-tabs {
  background: rgba(0,0,0,0.18); border-radius: 9px; padding: 3px; display: flex; gap: 2px;
}
.nav-tab {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 16px; border-radius: 7px; font-size: 0.8rem; font-weight: 600;
  color: rgba(255,255,255,0.72); text-decoration: none; transition: background 0.15s, color 0.15s;
}
.nav-tab .material-icons-outlined { font-size: 0.95rem; }
.nav-tab:hover { background: rgba(255,255,255,0.15); color: #fff; }
.nav-tab.active { background: rgba(255,255,255,0.95); color: var(--brand-bg); }

.mid {
  flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden;
  padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 12px;
}

.app-title { text-align: center; }
.app-title h1 { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin-bottom: 2px; }
.app-title p { color: var(--muted); font-size: 0.76rem; }

/* ── Input ── */
.search-wrap {
  display: flex; align-items: center;
  background: #fff; border: 1.5px solid var(--border); border-radius: 10px;
  overflow: hidden; transition: border-color 0.2s;
}
.search-wrap:focus-within { border-color: var(--primary-2); }
.search-wrap.error { border-color: #ef4444; animation: shake 0.35s ease; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-4px); }
  75%      { transform: translateX(4px); }
}
.search-icon {
  padding: 0 8px 0 13px; color: var(--border-soft); flex-shrink: 0;
  font-size: 1.2rem; transition: color 0.2s;
}
.search-wrap:focus-within .search-icon { color: var(--accent); }
.search-input {
  flex: 1; background: transparent; border: none; outline: none;
  padding: 13px 10px 13px 4px; font-size: 1.05rem;
  color: var(--text); font-family: inherit;
}
.search-input::placeholder { color: var(--border-soft); font-size: 0.9rem; }
.detect-pill {
  font-size: 0.6rem; font-weight: 700; padding: 2px 7px; border-radius: 10px;
  margin-right: 10px; white-space: nowrap; flex-shrink: 0;
  background: var(--mid); color: var(--accent);
  opacity: 0; transition: opacity 0.2s;
}
.detect-pill.visible { opacity: 1; }

.data-status {
  font-size: 0.68rem; color: var(--border-soft);
  display: flex; align-items: center; gap: 4px; margin-top: 4px;
}
.data-status.ready { color: var(--border-soft); }
.data-status.error { color: #ef4444; }
.data-status .material-icons-outlined { font-size: 0.85rem; }

.btn-row { display: flex; justify-content: flex-end; margin-top: 8px; }
.search-btn {
  padding: 10px 24px; background: var(--primary-2); color: #fff;
  border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: background 0.2s, transform 0.1s;
  display: flex; align-items: center; gap: 5px;
}
.search-btn .material-icons-outlined { font-size: 1.1rem; }
.search-btn:hover { background: var(--primary-hover); }
.search-btn:active { transform: scale(0.97); }
.search-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ── Result shared ── */
.results { display: none; flex-direction: column; gap: 8px; }
.results.visible { display: flex; }
.result-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.result-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 12px; border-bottom: 1px solid var(--border); background: var(--light);
}
.result-label { font-size: 0.7rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; }
.result-meta { font-size: 0.68rem; color: var(--muted); font-style: italic; }
.copy-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  font-size: 0.65rem; padding: 2px 8px; border-radius: 4px;
  cursor: pointer; transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.copy-btn:hover { color: var(--primary); border-color: var(--border-soft); background: var(--mid); }
.copy-btn.copied { color: #16a34a; border-color: #86efac; background: #f0fdf4; }
.result-body { padding: 10px 14px; font-size: 0.92rem; line-height: 1.75; color: var(--text); min-height: 42px; }
.loading-dots { color: var(--border-soft); font-style: italic; font-size: 0.82rem; }
.err-text { color: #ef4444; font-size: 0.82rem; }
.addr-code { font-size: 0.78rem; color: var(--muted); margin-bottom: 3px; }
.addr-main { font-size: 1rem; font-weight: 600; }

/* ── Address→code list ── */
.addr-list { display: flex; flex-direction: column; }
.addr-list-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.addr-list-item:last-child { border-bottom: none; }
.addr-list-item:hover { background: var(--light); }
.addr-item-code {
  font-size: 0.82rem; font-weight: 700; color: var(--primary);
  font-family: 'Courier New', monospace; letter-spacing: 0.04em;
  white-space: nowrap; flex-shrink: 0; min-width: 76px;
}
.addr-item-info { flex: 1; min-width: 0; }
.addr-item-address { font-size: 0.85rem; font-weight: 500; color: var(--text); }
.addr-item-area { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
.addr-item-copy {
  background: none; border: 1px solid var(--border); color: var(--muted);
  font-size: 0.62rem; padding: 2px 7px; border-radius: 4px;
  cursor: pointer; flex-shrink: 0;
  transition: color 0.15s, border-color 0.15s, background 0.15s; white-space: nowrap;
}
.addr-item-copy:hover { color: var(--primary); border-color: var(--border-soft); background: var(--mid); }
.addr-item-copy.copied { color: #16a34a; border-color: #86efac; background: #f0fdf4; }

/* ── "Too broad" grouped view ── */
.broad-note {
  font-size: 0.8rem; color: var(--text); padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--light);
}
.broad-note strong { color: var(--primary); }
.broad-groups { display: flex; flex-direction: column; }
.broad-group {
  padding: 9px 14px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.1s;
  display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
}
.broad-group:last-child { border-bottom: none; }
.broad-group:hover { background: var(--light); }
.broad-group-city { font-size: 0.88rem; font-weight: 600; color: var(--primary); }
.broad-group-count { font-size: 0.7rem; color: var(--muted); }
.broad-group-towns { font-size: 0.72rem; color: var(--muted); font-style: italic; }
</style>
</head>
<body>

<div class="brand-bar">
  <span class="material-icons-outlined brand-icon">local_post_office</span>
  <div>
    <div class="brand-name">Grasp Agent Japan</div>
    <div class="brand-ja">&#12464;&#12521;&#12473;&#12503;&#12456;&#12540;&#12472;&#12455;&#12531;&#12488;&#12472;&#12515;&#12497;&#12531;</div>
  </div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
    <span class="material-icons-outlined">palette</span> Pink
  </button>
</div>
<nav class="nav-bar">
  <div class="nav-tabs">
    <a class="nav-tab" href="/">
      <span class="material-icons-outlined">description</span> PDF
    </a>
    <a class="nav-tab" href="/translate">
      <span class="material-icons-outlined">translate</span> Translate
    </a>
    <a class="nav-tab active" href="/postal">
      <span class="material-icons-outlined">local_post_office</span> Postal
    </a>
  </div>
</nav>

<div class="mid">
  <div class="app-title">
    <h1>Japan Postal Code</h1>
    <p>Paste a 〒 code or type an address — it figures out which</p>
  </div>

  <div>
    <div class="search-wrap" id="searchWrap">
      <span class="material-icons-outlined search-icon" id="searchIcon">search</span>
      <input class="search-input" id="searchInput" type="text"
        placeholder="123-4567  or  横浜市港北区新横浜..." autocomplete="off" autocorrect="off" spellcheck="false">
      <span class="detect-pill" id="detectPill"></span>
    </div>
    <div class="data-status" id="dataStatus">
      <span class="material-icons-outlined">cloud_download</span> Loading address data…
    </div>
    <div class="btn-row">
      <button class="search-btn" id="searchBtn" onclick="detectAndSearch()" disabled>
        <span class="material-icons-outlined">search</span> Search
      </button>
    </div>
  </div>

  <!-- Code → address results -->
  <div class="results" id="codeResults">
    <div class="result-card">
      <div class="result-header">
        <span class="result-label">Address</span>
        <button class="copy-btn" onclick="copyEl('addressOut',this)">Copy</button>
      </div>
      <div class="result-body" id="addressOut"></div>
    </div>
    <div class="result-card">
      <div class="result-header">
        <span class="result-label">Reading (Romaji)</span>
        <button class="copy-btn" onclick="copyEl('romajiOut',this)">Copy</button>
      </div>
      <div class="result-body" id="romajiOut"></div>
    </div>
  </div>

  <!-- Address → code results -->
  <div class="results" id="addrResults">
    <div class="result-card">
      <div class="result-header">
        <span class="result-label" id="addrResultLabel">Matching postal codes</span>
        <span class="result-meta" id="addrResultMeta"></span>
      </div>
      <div id="addrResultBody"></div>
    </div>
  </div>
</div>

<script>
var THEME_KEY = 'gaj_theme';

function toggleTheme() {
  var isPink = document.body.classList.toggle('pink');
  localStorage.setItem(THEME_KEY, isPink ? 'pink' : 'blue');
  document.getElementById('themeToggle').innerHTML =
    '<span class="material-icons-outlined">palette</span> ' + (isPink ? 'Blue' : 'Pink');
}
(function() {
  if (localStorage.getItem(THEME_KEY) === 'pink') {
    document.body.classList.add('pink');
    document.getElementById('themeToggle').innerHTML = '<span class="material-icons-outlined">palette</span> Blue';
  }
})();

/* ─── Data loading ─── */
var postalData = null;   // array of [code7, pref, city, town]
var codeMap    = null;   // Map: code7 → record

fetch('/postal_data.json')
  .then(function(r) { return r.json(); })
  .then(function(records) {
    postalData = records;
    codeMap = new Map();
    records.forEach(function(r) { codeMap.set(r[0], r); });
    var status = document.getElementById('dataStatus');
    status.style.display = 'none';
    document.getElementById('searchBtn').disabled = false;
    document.getElementById('searchInput').focus();
  })
  .catch(function() {
    var status = document.getElementById('dataStatus');
    status.className = 'data-status error';
    status.innerHTML = '<span class="material-icons-outlined">error_outline</span> Failed to load address data.';
  });

/* ─── Input handling ─── */
var searchInput = document.getElementById('searchInput');
var detectPill  = document.getElementById('detectPill');
var searchIcon  = document.getElementById('searchIcon');

searchInput.addEventListener('input', function() {
  // Normalize full-width digits/spaces (from Japanese IME) to half-width first
  var normalized = searchInput.value.normalize('NFKC');
  if (normalized !== searchInput.value) searchInput.value = normalized;

  var val = searchInput.value;
  if (!val) {
    detectPill.className = 'detect-pill';
    searchIcon.textContent = 'search';
    return;
  }
  if (/^[\d\-\s]*$/.test(val)) {
    var d = val.replace(/\D/g, '').slice(0, 7);
    var fmt = d.length > 3 ? d.slice(0,3) + '-' + d.slice(3) : d;
    if (searchInput.value !== fmt) searchInput.value = fmt;
    detectPill.textContent = '〒 code';
    detectPill.className = 'detect-pill visible';
    searchIcon.textContent = 'pin';
  } else {
    detectPill.textContent = 'address';
    detectPill.className = 'detect-pill visible';
    searchIcon.textContent = 'location_on';
  }
});
searchInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); detectAndSearch(); }
});

/* ─── Normalization ─── */
function normalize(s) {
  s = s.normalize('NFKC');            // full-width → half-width
  s = s.replace(/[\s　]/g, '');       // strip spaces
  s = s.replace(/[ー－‐—―−]/g, 'ー'); // normalize dashes (keep Japanese dash)
  return s;
}

/* ─── Helpers ─── */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtCode(c) { return c.slice(0,3) + '-' + c.slice(3); }
function shake() {
  var wrap = document.getElementById('searchWrap');
  wrap.classList.add('error');
  setTimeout(function() { wrap.classList.remove('error'); }, 400);
}
function setLoading(id) {
  document.getElementById(id).innerHTML = '<span class="loading-dots">…</span>';
}
function setCard(id, html, isErr) {
  var el = document.getElementById(id);
  el.innerHTML = html;
  el.className = 'result-body' + (isErr ? ' err-text' : '');
}
function copyEl(elId, btn) {
  var text = (document.getElementById(elId).innerText || '').trim();
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = 'Copied!'; btn.className = 'copy-btn copied';
    setTimeout(function() { btn.textContent = 'Copy'; btn.className = 'copy-btn'; }, 1500);
  });
}
function copyCode(code, btn) {
  navigator.clipboard.writeText(code).then(function() {
    btn.textContent = 'Copied!'; btn.className = 'addr-item-copy copied';
    setTimeout(function() { btn.textContent = 'Copy 〒'; btn.className = 'addr-item-copy'; }, 1500);
  });
}

/* ─── Romaji via Google Translate ─── */
function googleRomaji(text) {
  var url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=en' +
            '&dt=t&dt=rm&dj=1&q=' + encodeURIComponent(text);
  return fetch(url)
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(data) {
      var romaji = '';
      if (data && Array.isArray(data.sentences)) {
        data.sentences.forEach(function(seg) {
          var r = seg.src_translit || seg.translit || '';
          if (r) romaji += (romaji ? ' ' : '') + r;
        });
      }
      return romaji.trim();
    });
}

/* ─── Main dispatcher ─── */
function detectAndSearch() {
  var val = searchInput.value.trim();
  if (!val) { shake(); return; }
  if (!postalData) { shake(); return; }

  var digits = val.replace(/\D/g, '');
  if (/^[\d\-\s]*$/.test(val)) {
    if (digits.length !== 7) { shake(); return; }
    doCodeSearch(digits);
  } else {
    doAddrSearch(normalize(val));
  }
}

/* ─── Code → address ─── */
function doCodeSearch(digits) {
  document.getElementById('addrResults').className = 'results';
  document.getElementById('codeResults').className = 'results visible';
  setLoading('addressOut'); setLoading('romajiOut');

  var row = codeMap.get(digits);
  if (!row) {
    setCard('addressOut', '〒 ' + esc(fmtCode(digits)) + ' — not found.', true);
    setCard('romajiOut', '—', false);
    return;
  }

  var code = fmtCode(row[0]);
  var addr = row[1] + row[2] + (row[3] ? '　' + row[3] : '');
  setCard('addressOut',
    '<div class="addr-code">〒 ' + esc(code) + '</div>' +
    '<div class="addr-main">' + esc(addr) + '</div>', false);

  googleRomaji(addr)
    .then(function(r) { setCard('romajiOut', esc(r) || '(no reading returned)', !r); })
    .catch(function() { setCard('romajiOut', '—', false); });
}

/* ─── Address → codes ─── */
function doAddrSearch(query) {
  document.getElementById('codeResults').className = 'results';
  document.getElementById('addrResults').className = 'results visible';
  document.getElementById('addrResultMeta').textContent = '';
  document.getElementById('addrResultBody').innerHTML =
    '<div class="result-body"><span class="loading-dots">Searching…</span></div>';

  // Linear scan — ~127k rows, fast enough in practice
  var results = [];
  var cap = 300;
  for (var i = 0; i < postalData.length; i++) {
    var r = postalData[i];
    // Search: city+town, or pref+city+town, or just city
    var full     = r[1] + r[2] + r[3];
    var citytown = r[2] + r[3];
    if (full.indexOf(query) !== -1 || citytown.indexOf(query) !== -1) {
      results.push(r);
      if (results.length >= cap) break;
    }
  }

  renderAddrResults(results, query, results.length >= cap);
}

function renderAddrResults(results, query, hitCap) {
  var label = document.getElementById('addrResultLabel');
  var meta  = document.getElementById('addrResultMeta');
  var body  = document.getElementById('addrResultBody');

  // ── No results ──
  if (results.length === 0) {
    label.textContent = 'Matching postal codes';
    meta.textContent = '';
    body.innerHTML = '<div class="result-body err-text">No results for「' + esc(query) + '」. Try a shorter or different address.</div>';
    return;
  }

  // ── Too broad: group by city ──
  // Triggered when we hit the scan cap or when many unique cities appear
  var uniqueCities = {};
  results.forEach(function(r) {
    var k = r[1] + r[2];
    if (!uniqueCities[k]) uniqueCities[k] = { pref: r[1], city: r[2], count: 0, towns: [] };
    uniqueCities[k].count++;
    if (uniqueCities[k].towns.length < 3 && r[3]) uniqueCities[k].towns.push(r[3]);
  });
  var cityList = Object.values(uniqueCities).sort(function(a,b){ return b.count - a.count; });

  if (hitCap || results.length > 80 || cityList.length > 8) {
    label.textContent = 'Too broad — narrow it down';
    meta.textContent = (hitCap ? '300+' : results.length) + ' matches';

    var note = '<div class="broad-note">「<strong>' + esc(query) + '</strong>」 matches too many codes. ' +
      'Add a ward or town name to narrow the results.</div>' +
      '<div class="broad-groups">';
    cityList.slice(0, 20).forEach(function(g) {
      var towns = g.towns.length ? ' — ' + g.towns.map(esc).join('、') + (g.count > 3 ? '…' : '') : '';
      note += '<div class="broad-group" onclick="refineSearch(\'' + esc(g.pref + g.city).replace(/'/g,"\\'") + '\')">' +
        '<span class="broad-group-city">' + esc(g.city) + '</span>' +
        '<span class="broad-group-count">' + g.count + ' codes</span>' +
        '<span class="broad-group-towns">' + towns + '</span>' +
      '</div>';
    });
    if (cityList.length > 20) {
      note += '<div style="padding:8px 14px;font-size:0.72rem;color:var(--muted)">+ ' + (cityList.length - 20) + ' more areas — type more to narrow down.</div>';
    }
    note += '</div>';
    body.innerHTML = note;
    return;
  }

  // ── List view ──
  label.textContent = 'Matching postal codes';
  meta.textContent = results.length + ' result' + (results.length > 1 ? 's' : '');

  var html = '<div class="addr-list">';
  results.forEach(function(r) {
    var code  = fmtCode(r[0]);
    var town  = r[3] ? r[1] + r[2] + '　' + r[3] : r[1] + r[2];
    var area  = r[3] ? r[1] + r[2] : '';
    html += '<div class="addr-list-item">' +
      '<div class="addr-item-code">〒 ' + esc(code) + '</div>' +
      '<div class="addr-item-info">' +
        '<div class="addr-item-address">' + esc(r[3] || (r[2] || r[1])) + '</div>' +
        (area ? '<div class="addr-item-area">' + esc(r[1] + r[2]) + '</div>' : '') +
      '</div>' +
      '<button class="addr-item-copy" onclick="copyCode(\'' + esc(code) + '\',this)">Copy 〒</button>' +
    '</div>';
  });
  html += '</div>';
  body.innerHTML = html;
}

function refineSearch(text) {
  searchInput.value = text;
  detectPill.textContent = 'address';
  detectPill.className = 'detect-pill visible';
  searchIcon.textContent = 'location_on';
  detectAndSearch();
}
</script>
